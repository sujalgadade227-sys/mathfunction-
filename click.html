<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Counter</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
</head>

<body>

    <h1 id="h">0</h1> 
    
    <button onclick="getClick()">+</button>
    <button onclick="getClick1()">-</button>

    <script>
        let count = 0;
        let ele = document.getElementById("h");
       
        function getClick() {
            ele.innerHTML = ++count;
        }
        
        function getClick1() {
            ele.innerHTML = --count;
        }
    </script>

</body>

</html>
