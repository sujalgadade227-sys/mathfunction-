<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Simple Login</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
</head>

<body>
    <input type="text" id="username" placeholder="Enter username">
    <br><br>
    <input type="password" id="password" placeholder="Enter password">
    <br><br>
    <button type="button" id="submit" onclick="getclick()">Login</button>
    <br>
    <h3 id="message"></h3>



    <script>

        let user = document.getElementById('username');
        let pass = document.getElementById('password');

        let usernamea = "admin";
        let passworda = "admin@123";

        function getclick() {

            if (user.value === usernamea && pass.value === passworda) {

                alert("Login successful!");
            }
            else {





                let mobile = prompt("Please enter your mobile number:");

                if (mobile) {
                    document.getElementById('message').innerHTML = "Invalid username or password please entered mobile number.";

                    let generatedOTP = Math.floor(Math.random() * 9000);
                    alert("Your OTP code is: " + generatedOTP);


                    let userOTP = prompt("Enter the OTP code you received:");


                    if (userOTP === String(generatedOTP)) {
                        alert("Login Successful via OTP!");
                    } else {
                        alert("Incorrect OTP! Login Failed.")


                    }
                }

            }
        }
    </script>
</body>

</html>
