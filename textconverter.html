<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
    <style>
        h1 {
            text-align: center;
            color: black;
            text color: blue;

        }
        *{
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        button{
            padding: 10px;
            margin: 10px;
            border-radius: 50px;
            background-color: black;
            color: white;
            border: none;
            
        }
        background{
            background-color: red;
        }
        
    </style>

</head>

<body>



    <h1>Text Converter</h1>
    <textarea name="" id="content" rows="15" cols="60">
        
    </textarea>
    <br><br>
    <button onclick="convertUppercase()">Convert ToUpercase</button>
    <button onclick="convertLowercase()">ConvertToLowercase</button>
    <button onclick="countWords()">CountWords</button>



    <script>

        let text = document.getElementById("content")
       
        function convertUppercase() {
            text.value = text.value.toUpperCase();

        }

        function convertLowercase() {
            text.value = text.value.toLowerCase();
        }
         
        function countWords() {
            let words = text.value.trim().split(/\s+/);
            let wordCount = words.length;
            alert("Word Count: " + wordCount);
        }
       



    </script>
</body>

</html>
