<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Amazon Lite</title>
    <meta name="description" content="A simple e-commerce search page">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #232f3e;
            margin-bottom: 10px;
        }

        #searchBar {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            margin-bottom: 30px;
            border: 2px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #searchBar:focus {
            border-color: #ff9900;
        }


        #productContainer {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }


        .product-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            max-width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .product-card h3 {
            font-size: 18px;
            color: #333;
            margin: 10px 0 5px 0;
            text-transform: capitalize;
        }

        .product-card p {
            color: #777;
            font-size: 14px;
            margin: 0 0 15px 0;
        }

        .product-card .price {
            font-size: 20px;
            color: #b12704;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-card button {
            background-color: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        .product-card button:hover {
            background-color: #f7ca00;
        }
    </style>
</head>

        function display(list) {
            container.innerHTML = "";

            list.forEach((product) => {

                let card = document.createElement("div");
                card.className = "product-card";

                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" />
                    <h3>${product.name}</h3>
                    <p>Brand: ${product.brand}</p>
                    <div class="price">₹${product.price.toLocaleString('en-IN')}</div>
                    <button onclick="alert('Added ${product.name} to cart!')">Buy Now</button>
                `;
                container.appendChild(card);
            });
        }


        search.addEventListener("input", (e) => {

            let value = e.target.value.toLowerCase();

            let filteredProducts = products.filter((product) => {
                return (
                    product.name.toLowerCase().includes(value) ||
                    product.brand.toLowerCase().includes(value)
                );
            });

            display(filteredProducts);
        });


        display(products);
    </script>
